<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maintenance — ConformXpert</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--navy:#0C1929;--navy2:#162438;--gold:#C8A84B;--gold-lt:#E2C97A;--white:#F0F4FA;--gray1:#8896A4;--gray2:#C2CDD6;--muted:#68798A}
    html,body{height:100%}
    body{
      font-family:'DM Sans',sans-serif;
      background:var(--navy);
      color:var(--white);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      min-height:100vh;
      padding:2rem;
      text-align:center;
    }

    /* Animated ring */
    .ring-wrap{position:relative;width:120px;height:120px;margin:0 auto 2.5rem}
    .ring-wrap svg{animation:spin 3s linear infinite}
    @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    .ring-icon{
      position:absolute;inset:0;
      display:flex;align-items:center;justify-content:center;
      font-size:2.4rem;
    }

    .logo{
      font-family:'Playfair Display',serif;
      font-size:1.3rem;
      margin-bottom:3rem;
      opacity:.7;
    }
    .logo span{color:var(--gold)}

    h1{
      font-family:'Playfair Display',serif;
      font-size:clamp(1.8rem,4vw,2.6rem);
      font-weight:700;
      line-height:1.2;
      margin-bottom:1rem;
    }
    h1 span{color:var(--gold)}

    .subtitle{
      font-size:1rem;
      color:var(--gray2);
      line-height:1.7;
      max-width:480px;
      margin:0 auto 2.5rem;
      font-weight:300;
    }

    .status-card{
      background:var(--navy2);
      border:1px solid rgba(200,168,75,.2);
      border-radius:14px;
      padding:1.4rem 2rem;
      margin-bottom:2.5rem;
      display:inline-flex;
      align-items:center;
      gap:.9rem;
    }
    .status-dot{
      width:10px;height:10px;border-radius:50%;
      background:#E5A93A;
      box-shadow:0 0 0 3px rgba(229,169,58,.2);
      animation:pulse 1.5s ease-in-out infinite;
      flex-shrink:0;
    }
    @keyframes pulse{
      0%,100%{box-shadow:0 0 0 3px rgba(229,169,58,.2)}
      50%{box-shadow:0 0 0 6px rgba(229,169,58,.08)}
    }
    .status-text{font-size:.88rem;color:var(--gray2)}
    .status-text strong{color:var(--gold)}

    .eta{
      font-size:.82rem;
      color:var(--muted);
      margin-top:-.5rem;
      margin-bottom:2.5rem;
    }

    .contact-link{
      display:inline-flex;
      align-items:center;
      gap:.5rem;
      padding:.65rem 1.5rem;
      border:1px solid rgba(200,168,75,.25);
      border-radius:8px;
      color:var(--gold);
      text-decoration:none;
      font-size:.85rem;
      font-weight:500;
      transition:background .2s,border-color .2s;
      background:rgba(200,168,75,.05);
    }
    .contact-link:hover{background:rgba(200,168,75,.1);border-color:rgba(200,168,75,.4)}

    .footer{
      position:fixed;
      bottom:1.5rem;
      font-size:.72rem;
      color:var(--muted);
    }
    .footer a{color:var(--gold);text-decoration:none}
  </style>
</head>
<body>

  <div class="logo">Conform<span>Expert</span></div>

  <div class="ring-wrap">
    <svg width="120" height="120" viewBox="0 0 120 120">
      <circle cx="60" cy="60" r="52" fill="none" stroke="rgba(200,168,75,.08)" stroke-width="4"/>
      <circle cx="60" cy="60" r="52" fill="none" stroke="#C8A84B" stroke-width="4"
        stroke-dasharray="326" stroke-dashoffset="244"
        stroke-linecap="round"/>
    </svg>
    <div class="ring-icon">🔧</div>
  </div>

  <h1>Maintenance<br><span>en cours</span></h1>

  <p class="subtitle">
    Le site est temporairement indisponible pour une mise à jour.<br>
    Patience ! Ca ne va pas durer.
  </p>

  <div class="status-card">
    <div class="status-dot"></div>
    <div class="status-text"><strong>Mise à jour en cours</strong> — plateforme de conformité thermique</div>
  </div>

  <p class="eta">Durée estimée : moins de deux heures</p>

  <a href="/cdn-cgi/l/email-protection#88ebe7e6fce9ebfcc8ebe7e6eee7fae5edf0f8edfafca6ebeb" class="contact-link">
    ✉ Nous contacter
  </a>



  
  <div class="footer">
    © 2026 <a href="/">ConformXpert</a>
